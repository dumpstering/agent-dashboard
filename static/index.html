<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Orchestration</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <!-- Header Bar -->
  <div class="header-bar">
    <div class="header-title">Agent Orchestration</div>
    <div class="connection-wrapper">
      <span class="connection-status disconnected" id="connStatus"></span>
      <span id="connText">Connecting...</span>
    </div>
  </div>

  <!-- Two-Column Layout -->
  <div class="layout">
    <!-- Left Sidebar: System Stats -->
    <div class="sidebar">
      <div class="system-stats">
        <div class="section-title">System</div>

        <!-- Uptime -->
        <div class="stat-item">
          <div class="stat-item-label">Uptime</div>
          <div class="stat-item-value stat-item-large" id="sysUptime">—</div>
        </div>

        <!-- RAM Usage -->
        <div class="stat-item">
          <div class="stat-item-label">RAM Usage</div>
          <div class="stat-item-value" id="sysRam">— / — GB</div>
          <div class="stat-item-secondary" id="sysRamPercent">—%</div>
          <div class="progress-bar">
            <div class="progress-fill" id="sysRamBar" style="width: 0%"></div>
          </div>
        </div>

        <!-- CPU Load -->
        <div class="stat-item">
          <div class="stat-item-label">CPU Load</div>
          <div class="stat-item-value" id="sysCpu">—%</div>
          <div class="cpu-loads">
            <div class="cpu-load-bar">
              <div class="cpu-load-fill" id="cpuLoad1m" style="height: 0%"></div>
              <div class="cpu-load-label" id="cpuLoad1mLabel">1m</div>
            </div>
            <div class="cpu-load-bar">
              <div class="cpu-load-fill" id="cpuLoad5m" style="height: 0%"></div>
              <div class="cpu-load-label" id="cpuLoad5mLabel">5m</div>
            </div>
            <div class="cpu-load-bar">
              <div class="cpu-load-fill" id="cpuLoad15m" style="height: 0%"></div>
              <div class="cpu-load-label" id="cpuLoad15mLabel">15m</div>
            </div>
          </div>
        </div>

        <!-- Network -->
        <div class="stat-item">
          <div class="stat-item-label">Network</div>
          <div class="network-matrix">
            <div class="network-grid">
              <div class="network-cell network-head"></div>
              <div class="network-cell network-head">All Time</div>
              <div class="network-cell network-head">24h</div>
              <div class="network-cell network-head">1h</div>

              <div class="network-cell network-row-label">up</div>
              <div class="network-cell network-value" id="sysNetAllTimeSent">—</div>
              <div class="network-cell network-value" id="sysNet24hSent">—</div>
              <div class="network-cell network-value" id="sysNet1hSent">—</div>

              <div class="network-cell network-row-label row-end">dn</div>
              <div class="network-cell network-value row-end" id="sysNetAllTimeRecv">—</div>
              <div class="network-cell network-value row-end" id="sysNet24hRecv">—</div>
              <div class="network-cell network-value row-end" id="sysNet1hRecv">—</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Main Content -->
    <div class="main-content">
      <!-- Agent Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="statActive">0</div>
          <div class="stat-label">Active Agents</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statCompleted">0</div>
          <div class="stat-label">Completed Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statQueued">0</div>
          <div class="stat-label">Queued</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statTotal">0</div>
          <div class="stat-label">Total Agents</div>
        </div>
      </div>

      <!-- Agent Table -->
      <div class="table-section">
        <div class="table-header">
          <div class="table-title">Agent Status</div>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Agent</th>
                <th>Task</th>
                <th>Status</th>
                <th>Duration</th>
              </tr>
            </thead>
            <tbody id="agentTableBody">
              <tr>
                <td colspan="4">
                  <div class="empty-state">
                    <div class="empty-state-icon">⚡</div>
                    <div>No agents active</div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Chat Panel -->
      <div class="chat-panel">
        <div class="chat-header">
          <div class="table-title">Messages</div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-wrapper">
          <input
            type="text"
            class="chat-input"
            id="chatInput"
            placeholder="Send a message..."
            autocomplete="off"
          />
          <button class="chat-send" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script src="/static/js/agents.js"></script>
  <script src="/static/js/chat.js"></script>
  <script src="/static/js/system.js"></script>
  <script src="/static/js/websocket.js"></script>
</body>
</html>
