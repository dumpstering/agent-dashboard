<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Orchestration</title>
  <style>
    /* Dark Tech Design System */
    :root {
      /* Colors */
      --dt-bg-root: oklch(0.13 0.02 265);
      --dt-bg-surface: oklch(0.16 0.02 265);
      --dt-bg-elevated: oklch(0.19 0.02 265);
      --dt-bg-overlay: oklch(0.13 0.02 265 / 80%);
      --dt-bg-subtle: oklch(0.22 0.01 265);
      --dt-border: oklch(1 0 0 / 10%);
      --dt-border-strong: oklch(1 0 0 / 15%);
      --dt-border-subtle: oklch(1 0 0 / 6%);
      --dt-text-primary: oklch(0.95 0.01 265);
      --dt-text-secondary: oklch(0.65 0.02 265);
      --dt-text-muted: oklch(0.45 0.02 265);
      --dt-text-faint: oklch(0.35 0.01 265);
      --dt-accent: oklch(0.65 0.15 250);
      --dt-accent-muted: oklch(0.65 0.15 250 / 15%);
      --dt-accent-text: oklch(0.78 0.12 250);
      --dt-success: oklch(0.65 0.15 155);
      --dt-warning: oklch(0.72 0.12 80);
      --dt-error: oklch(0.62 0.2 25);

      /* Typography */
      --dt-font-mono: "SF Mono", "Menlo", "Monaco", "Courier New", monospace;
      --dt-font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --dt-text-xs: 11px;
      --dt-text-sm: 12px;
      --dt-text-base: 13px;
      --dt-text-md: 14px;
      --dt-text-lg: 16px;
      --dt-text-xl: 20px;
      --dt-text-2xl: 24px;

      /* Motion */
      --dt-duration-instant: 80ms;
      --dt-duration-fast: 120ms;
      --dt-duration-normal: 150ms;
      --dt-duration-slow: 200ms;
      --dt-ease-snappy: cubic-bezier(0.25, 1, 0.5, 1);

      /* Spacing */
      --dt-space-xs: 4px;
      --dt-space-sm: 8px;
      --dt-space-md: 12px;
      --dt-space-lg: 16px;
      --dt-space-xl: 24px;
      --dt-space-2xl: 32px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--dt-font-sans);
      font-size: var(--dt-text-base);
      background: var(--dt-bg-root);
      color: var(--dt-text-secondary);
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* Header Bar */
    .header-bar {
      background: var(--dt-bg-surface);
      border-bottom: 1px solid var(--dt-border);
      padding: var(--dt-space-lg) var(--dt-space-xl);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-title {
      font-size: var(--dt-text-lg);
      color: var(--dt-text-primary);
      font-weight: 600;
    }

    .connection-wrapper {
      display: flex;
      align-items: center;
      font-size: var(--dt-text-sm);
      font-family: var(--dt-font-mono);
      color: var(--dt-text-muted);
    }

    .connection-status {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: var(--dt-space-sm);
      transition: background var(--dt-duration-fast) var(--dt-ease-snappy);
    }

    .connection-status.connected {
      background: var(--dt-success);
      animation: pulse 2s ease-in-out infinite;
    }

    .connection-status.disconnected {
      background: var(--dt-error);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Two-column Layout */
    .layout {
      display: flex;
      height: calc(100vh - 57px);
    }

    .sidebar {
      width: 280px;
      background: var(--dt-bg-surface);
      border-right: 1px solid var(--dt-border);
      overflow-y: auto;
      flex-shrink: 0;
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: var(--dt-space-xl);
    }

    /* System Stats Section */
    .system-stats {
      padding: var(--dt-space-xl);
    }

    .section-title {
      font-size: var(--dt-text-xs);
      color: var(--dt-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: var(--dt-space-lg);
      font-weight: 500;
    }

    .stat-item {
      margin-bottom: var(--dt-space-xl);
    }

    .stat-item-label {
      font-size: var(--dt-text-xs);
      color: var(--dt-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: var(--dt-space-sm);
    }

    .stat-item-value {
      font-family: var(--dt-font-mono);
      font-size: var(--dt-text-md);
      color: var(--dt-text-primary);
      font-variant-numeric: tabular-nums lining-nums;
      margin-bottom: var(--dt-space-xs);
    }

    .stat-item-large {
      font-size: var(--dt-text-xl);
    }

    .stat-item-secondary {
      font-family: var(--dt-font-mono);
      font-size: var(--dt-text-xs);
      color: var(--dt-text-muted);
      font-variant-numeric: tabular-nums lining-nums;
    }

    .network-matrix {
      border: 1px solid var(--dt-border);
      border-radius: 6px;
      overflow: hidden;
      background: var(--dt-bg-root);
    }

    .network-grid {
      display: grid;
      grid-template-columns: 34px repeat(3, minmax(0, 1fr));
      font-family: var(--dt-font-mono);
      font-size: var(--dt-text-xs);
      font-variant-numeric: tabular-nums lining-nums;
    }

    .network-cell {
      padding: 6px 8px;
      border-right: 1px solid var(--dt-border-subtle);
      border-bottom: 1px solid var(--dt-border-subtle);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .network-cell:nth-child(4n) {
      border-right: none;
    }

    .network-head {
      color: var(--dt-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      background: var(--dt-bg-surface);
    }

    .network-row-label {
      color: var(--dt-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .network-value {
      color: var(--dt-text-primary);
    }

    .network-cell.row-end {
      border-bottom: none;
    }

    /* Progress bars */
    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--dt-bg-root);
      border-radius: 2px;
      overflow: hidden;
      margin-top: var(--dt-space-sm);
    }

    .progress-fill {
      height: 100%;
      background: var(--dt-accent);
      transition: width var(--dt-duration-normal) var(--dt-ease-snappy);
    }

    .progress-fill.warning {
      background: var(--dt-warning);
    }

    .progress-fill.error {
      background: var(--dt-error);
    }

    /* CPU load bars */
    .cpu-loads {
      display: flex;
      gap: var(--dt-space-sm);
      margin-top: var(--dt-space-sm);
    }

    .cpu-load-bar {
      flex: 1;
      height: 32px;
      background: var(--dt-bg-root);
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }

    .cpu-load-fill {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: var(--dt-accent);
      transition: height var(--dt-duration-normal) var(--dt-ease-snappy);
    }

    .cpu-load-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--dt-font-mono);
      font-size: var(--dt-text-xs);
      color: var(--dt-text-primary);
      z-index: 1;
    }

    /* Agent Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--dt-space-lg);
      margin-bottom: var(--dt-space-xl);
    }

    .stat-card {
      background: var(--dt-bg-surface);
      border: 1px solid var(--dt-border);
      border-radius: 6px;
      padding: var(--dt-space-lg);
      transition: border-color var(--dt-duration-fast) var(--dt-ease-snappy);
    }

    .stat-value {
      font-family: var(--dt-font-mono);
      font-size: var(--dt-text-2xl);
      font-weight: 600;
      color: var(--dt-text-primary);
      font-variant-numeric: tabular-nums lining-nums;
      margin-bottom: var(--dt-space-xs);
    }

    .stat-label {
      font-size: var(--dt-text-xs);
      color: var(--dt-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* Loading State */
    .loading {
      opacity: 0.5;
      pointer-events: none;
    }

    .skeleton {
      background: linear-gradient(90deg, var(--dt-bg-surface) 25%, var(--dt-bg-elevated) 50%, var(--dt-bg-surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Table Section */
    .table-section {
      background: var(--dt-bg-surface);
      border: 1px solid var(--dt-border);
      border-radius: 6px;
      margin-bottom: var(--dt-space-xl);
      overflow: hidden;
    }

    .table-header {
      padding: var(--dt-space-lg);
      border-bottom: 1px solid var(--dt-border);
    }

    .table-title {
      font-size: var(--dt-text-md);
      color: var(--dt-text-primary);
      font-weight: 500;
    }

    .table-wrapper {
      overflow-x: auto;
      position: relative;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      background: var(--dt-bg-surface);
      font-family: var(--dt-font-sans);
      font-size: var(--dt-text-xs);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--dt-text-muted);
      text-align: left;
      padding: var(--dt-space-md) var(--dt-space-lg);
      border-bottom: 1px solid var(--dt-border-strong);
    }

    tbody tr {
      border-bottom: 1px solid var(--dt-border-subtle);
      transition: background var(--dt-duration-fast) var(--dt-ease-snappy);
    }

    tbody tr:hover {
      background: var(--dt-bg-subtle);
    }

    tbody td {
      padding: var(--dt-space-sm) var(--dt-space-lg);
      font-size: var(--dt-text-sm);
      color: var(--dt-text-secondary);
      height: 36px;
    }

    tbody td:first-child {
      font-family: var(--dt-font-mono);
      color: var(--dt-text-primary);
    }

    tbody td:nth-child(4) {
      font-family: var(--dt-font-mono);
      font-variant-numeric: tabular-nums lining-nums;
    }

    /* Project Group Headers */
    .project-group-header {
      background: var(--dt-bg-root);
      font-weight: 500;
      color: var(--dt-text-primary);
      font-size: var(--dt-text-sm);
    }

    .project-group-header td {
      padding: var(--dt-space-md) var(--dt-space-lg);
      border-top: 1px solid var(--dt-border);
      border-bottom: 1px solid var(--dt-border-subtle);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: var(--dt-space-2xl);
      color: var(--dt-text-muted);
    }

    .empty-state-icon {
      font-size: 32px;
      margin-bottom: var(--dt-space-md);
      opacity: 0.3;
    }

    /* Status Badges */
    .status-badge {
      display: inline-block;
      font-family: var(--dt-font-mono);
      font-size: var(--dt-text-xs);
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .status-working {
      background: var(--dt-accent-muted);
      color: var(--dt-accent-text);
    }

    .status-done {
      background: oklch(0.65 0.15 155 / 15%);
      color: oklch(0.75 0.12 155);
    }

    .status-queued {
      background: oklch(0.72 0.12 80 / 15%);
      color: oklch(0.82 0.1 80);
    }

    .status-dispatched {
      background: oklch(1 0 0 / 8%);
      color: var(--dt-text-secondary);
    }

    /* Chat Panel */
    .chat-panel {
      background: var(--dt-bg-surface);
      border: 1px solid var(--dt-border);
      border-radius: 6px;
      height: 400px;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: var(--dt-space-lg);
      border-bottom: 1px solid var(--dt-border);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: var(--dt-space-lg);
      display: flex;
      flex-direction: column;
      gap: var(--dt-space-md);
    }

    .chat-message {
      font-size: var(--dt-text-sm);
      opacity: 0;
      animation: fadeIn var(--dt-duration-normal) var(--dt-ease-snappy) forwards;
      max-width: 86%;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chat-message.chat-user {
      align-self: flex-end;
      text-align: right;
    }

    .chat-message.chat-op {
      align-self: flex-start;
      text-align: left;
    }

    .chat-message.chat-system {
      align-self: center;
      max-width: 100%;
      text-align: center;
    }

    .chat-meta {
      display: flex;
      align-items: center;
      gap: var(--dt-space-sm);
      margin-bottom: 3px;
    }

    .chat-message.chat-user .chat-meta {
      justify-content: flex-end;
    }

    .chat-author {
      font-family: var(--dt-font-mono);
      font-size: var(--dt-text-xs);
      color: var(--dt-text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .chat-timestamp {
      font-family: var(--dt-font-mono);
      font-size: var(--dt-text-xs);
      color: var(--dt-text-muted);
    }

    .chat-bubble {
      display: inline-block;
      background: var(--dt-bg-root);
      border: 1px solid var(--dt-border);
      color: var(--dt-text-secondary);
      padding: 7px 10px;
      border-radius: 8px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .chat-message.chat-user .chat-bubble {
      background: var(--dt-accent-muted);
      border-color: oklch(0.7 0.12 250 / 25%);
      color: var(--dt-text-primary);
    }

    .chat-text {
      color: var(--dt-text-secondary);
    }

    .chat-text.system {
      color: var(--dt-text-muted);
      font-style: italic;
    }

    .chat-message.typing .chat-bubble {
      border-style: dashed;
      color: var(--dt-text-muted);
    }

    .chat-input-wrapper {
      padding: var(--dt-space-lg);
      border-top: 1px solid var(--dt-border);
      display: flex;
      gap: var(--dt-space-sm);
    }

    .chat-input {
      flex: 1;
      background: var(--dt-bg-root);
      border: 1px solid var(--dt-border);
      border-radius: 4px;
      padding: var(--dt-space-sm) var(--dt-space-md);
      color: var(--dt-text-primary);
      font-family: var(--dt-font-sans);
      font-size: var(--dt-text-sm);
      outline: none;
      transition: border-color var(--dt-duration-instant) var(--dt-ease-snappy);
    }

    .chat-input:focus {
      border-color: var(--dt-accent);
    }

    .chat-send {
      background: var(--dt-accent);
      color: var(--dt-text-primary);
      border: none;
      border-radius: 4px;
      padding: var(--dt-space-sm) var(--dt-space-lg);
      font-size: var(--dt-text-sm);
      cursor: pointer;
      transition: opacity var(--dt-duration-fast) var(--dt-ease-snappy);
      font-family: var(--dt-font-sans);
    }

    .chat-send:hover {
      opacity: 0.9;
    }

    .chat-send:active {
      opacity: 0.8;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--dt-border);
      }

      .main-content {
        padding: var(--dt-space-lg);
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .table-wrapper {
        position: relative;
      }

      .table-wrapper::after {
        content: '';
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: 30px;
        background: linear-gradient(90deg, transparent, var(--dt-bg-surface));
        pointer-events: none;
      }

      thead th:first-child {
        position: sticky;
        left: 0;
        background: var(--dt-bg-surface);
        z-index: 2;
      }

      tbody td:first-child {
        position: sticky;
        left: 0;
        background: inherit;
        z-index: 1;
      }

      .chat-panel {
        height: 300px;
      }
    }

    /* Reduced Motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <!-- Header Bar -->
  <div class="header-bar">
    <div class="header-title">Agent Orchestration</div>
    <div class="connection-wrapper">
      <span class="connection-status disconnected" id="connStatus"></span>
      <span id="connText">Connecting...</span>
    </div>
  </div>

  <!-- Two-Column Layout -->
  <div class="layout">
    <!-- Left Sidebar: System Stats -->
    <div class="sidebar">
      <div class="system-stats">
        <div class="section-title">System</div>

        <!-- Uptime -->
        <div class="stat-item">
          <div class="stat-item-label">Uptime</div>
          <div class="stat-item-value stat-item-large" id="sysUptime">—</div>
        </div>

        <!-- RAM Usage -->
        <div class="stat-item">
          <div class="stat-item-label">RAM Usage</div>
          <div class="stat-item-value" id="sysRam">— / — GB</div>
          <div class="stat-item-secondary" id="sysRamPercent">—%</div>
          <div class="progress-bar">
            <div class="progress-fill" id="sysRamBar" style="width: 0%"></div>
          </div>
        </div>

        <!-- CPU Load -->
        <div class="stat-item">
          <div class="stat-item-label">CPU Load</div>
          <div class="stat-item-value" id="sysCpu">—%</div>
          <div class="cpu-loads">
            <div class="cpu-load-bar">
              <div class="cpu-load-fill" id="cpuLoad1m" style="height: 0%"></div>
              <div class="cpu-load-label" id="cpuLoad1mLabel">1m</div>
            </div>
            <div class="cpu-load-bar">
              <div class="cpu-load-fill" id="cpuLoad5m" style="height: 0%"></div>
              <div class="cpu-load-label" id="cpuLoad5mLabel">5m</div>
            </div>
            <div class="cpu-load-bar">
              <div class="cpu-load-fill" id="cpuLoad15m" style="height: 0%"></div>
              <div class="cpu-load-label" id="cpuLoad15mLabel">15m</div>
            </div>
          </div>
        </div>

        <!-- Network -->
        <div class="stat-item">
          <div class="stat-item-label">Network</div>
          <div class="network-matrix">
            <div class="network-grid">
              <div class="network-cell network-head"></div>
              <div class="network-cell network-head">All Time</div>
              <div class="network-cell network-head">24h</div>
              <div class="network-cell network-head">1h</div>

              <div class="network-cell network-row-label">up</div>
              <div class="network-cell network-value" id="sysNetAllTimeSent">—</div>
              <div class="network-cell network-value" id="sysNet24hSent">—</div>
              <div class="network-cell network-value" id="sysNet1hSent">—</div>

              <div class="network-cell network-row-label row-end">dn</div>
              <div class="network-cell network-value row-end" id="sysNetAllTimeRecv">—</div>
              <div class="network-cell network-value row-end" id="sysNet24hRecv">—</div>
              <div class="network-cell network-value row-end" id="sysNet1hRecv">—</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Main Content -->
    <div class="main-content">
      <!-- Agent Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="statActive">0</div>
          <div class="stat-label">Active Agents</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statCompleted">0</div>
          <div class="stat-label">Completed Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statQueued">0</div>
          <div class="stat-label">Queued</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statTotal">0</div>
          <div class="stat-label">Total Agents</div>
        </div>
      </div>

      <!-- Agent Table -->
      <div class="table-section">
        <div class="table-header">
          <div class="table-title">Agent Status</div>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Agent</th>
                <th>Task</th>
                <th>Status</th>
                <th>Duration</th>
              </tr>
            </thead>
            <tbody id="agentTableBody">
              <tr>
                <td colspan="4">
                  <div class="empty-state">
                    <div class="empty-state-icon">⚡</div>
                    <div>No agents active</div>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Chat Panel -->
      <div class="chat-panel">
        <div class="chat-header">
          <div class="table-title">Messages</div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-wrapper">
          <input
            type="text"
            class="chat-input"
            id="chatInput"
            placeholder="Send a message..."
            autocomplete="off"
          />
          <button class="chat-send" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // State
    let eventSource = null;
    let sseReconnectTimer = null;
    let systemStatsInterval = null;
    let chatSocket = null;
    let chatReconnectTimer = null;
    let chatReconnectDelayMs = 1000;
    let streamingBubble = null;
    let typingIndicator = null;

    // Format duration in seconds to human readable
    function formatDuration(seconds) {
      if (!seconds) return '—';
      if (seconds < 60) return `${seconds}s`;
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      if (mins < 60) return `${mins}m ${secs}s`;
      const hours = Math.floor(mins / 60);
      const remainMins = mins % 60;
      return `${hours}h ${remainMins}m`;
    }

    // Create status badge element
    function createStatusBadge(status) {
      const safeStatus = typeof status === 'string' ? status : 'unknown';
      const badge = document.createElement('span');
      badge.className = `status-badge status-${safeStatus}`;
      badge.textContent = safeStatus;
      return badge;
    }

    function createEmptyStateRow() {
      const row = document.createElement('tr');
      const cell = document.createElement('td');
      cell.colSpan = 4;

      const emptyState = document.createElement('div');
      emptyState.className = 'empty-state';

      const icon = document.createElement('div');
      icon.className = 'empty-state-icon';
      icon.textContent = '⚡';

      const text = document.createElement('div');
      text.textContent = 'No agents active';

      emptyState.appendChild(icon);
      emptyState.appendChild(text);
      cell.appendChild(emptyState);
      row.appendChild(cell);
      return row;
    }

    function createChatMessageElement(
      text,
      role = 'op',
      timestampSeconds = Math.floor(Date.now() / 1000),
      isTyping = false
    ) {
      const msg = document.createElement('div');
      msg.className = `chat-message chat-${role}`;
      if (isTyping) {
        msg.classList.add('typing');
      }

      if (role === 'system') {
        const body = document.createElement('span');
        body.className = 'chat-text system';
        body.textContent = typeof text === 'string' ? text : String(text ?? '');
        msg.appendChild(body);
        return msg;
      }

      const meta = document.createElement('div');
      meta.className = 'chat-meta';

      const author = document.createElement('span');
      author.className = 'chat-author';
      author.textContent = role === 'user' ? 'You' : 'Op';

      const timestamp = document.createElement('span');
      timestamp.className = 'chat-timestamp';
      const date = new Date(timestampSeconds * 1000);
      timestamp.textContent = date.toTimeString().split(' ')[0];

      const body = document.createElement('div');
      body.className = 'chat-bubble';
      body.textContent = typeof text === 'string' ? text : String(text ?? '');

      meta.appendChild(author);
      meta.appendChild(timestamp);
      msg.appendChild(meta);
      msg.appendChild(body);
      return msg;
    }

    function appendChatMessage(text, role = 'op', timestampSeconds = Math.floor(Date.now() / 1000), isTyping = false) {
      const messages = document.getElementById('chatMessages');
      const message = createChatMessageElement(text, role, timestampSeconds, isTyping);
      messages.appendChild(message);
      messages.scrollTop = messages.scrollHeight;
      return message;
    }

    function parseEventData(event, eventName) {
      try {
        return JSON.parse(event.data);
      } catch (error) {
        console.error(`Invalid SSE payload for ${eventName}:`, error);
        return null;
      }
    }

    // Update stats display
    function updateStats(stats) {
      if (!stats || typeof stats !== 'object') return;
      document.getElementById('statActive').textContent = String(stats.active ?? 0);
      document.getElementById('statCompleted').textContent = String(stats.completed_today ?? 0);
      document.getElementById('statQueued').textContent = String(stats.queued ?? 0);
      document.getElementById('statTotal').textContent = String(stats.total ?? 0);
    }

    // Update agent table
    function updateAgentTable(agents) {
      const tbody = document.getElementById('agentTableBody');

      tbody.replaceChildren();

      if (!Array.isArray(agents) || agents.length === 0) {
        tbody.appendChild(createEmptyStateRow());
        return;
      }

      // Group agents by project
      const byProject = {};
      agents.forEach(agent => {
        if (!byProject[agent.project]) {
          byProject[agent.project] = [];
        }
        byProject[agent.project].push(agent);
      });

      // Build table HTML
      const rows = [];
      Object.keys(byProject).sort().forEach(project => {
        const projectRow = document.createElement('tr');
        projectRow.className = 'project-group-header';
        const projectCell = document.createElement('td');
        projectCell.colSpan = 4;
        projectCell.textContent = project;
        projectRow.appendChild(projectCell);
        rows.push(projectRow);

        // Agents in this project
        byProject[project].forEach(agent => {
          const row = document.createElement('tr');

          const idCell = document.createElement('td');
          idCell.textContent = String(agent.id ?? '');
          row.appendChild(idCell);

          const taskCell = document.createElement('td');
          taskCell.textContent = String(agent.task ?? '');
          row.appendChild(taskCell);

          const statusCell = document.createElement('td');
          statusCell.appendChild(createStatusBadge(agent.status));
          row.appendChild(statusCell);

          const durationCell = document.createElement('td');
          durationCell.textContent = formatDuration(agent.duration);
          row.appendChild(durationCell);

          rows.push(row);
        });
      });

      tbody.append(...rows);
    }

    function showTypingIndicator(show) {
      const messages = document.getElementById('chatMessages');
      if (show) {
        if (typingIndicator) return;
        typingIndicator = createChatMessageElement('Op is typing...', 'op', Math.floor(Date.now() / 1000), true);
        messages.appendChild(typingIndicator);
        messages.scrollTop = messages.scrollHeight;
        return;
      }

      if (typingIndicator && typingIndicator.parentNode) {
        typingIndicator.parentNode.removeChild(typingIndicator);
      }
      typingIndicator = null;
    }

    function beginStreamIfNeeded() {
      if (streamingBubble) return;
      const message = appendChatMessage('', 'op');
      streamingBubble = message.querySelector('.chat-bubble');
    }

    function finalizeStream() {
      if (!streamingBubble) return;
      const text = streamingBubble.textContent.trim();
      if (!text) {
        const parent = streamingBubble.closest('.chat-message');
        if (parent && parent.parentNode) {
          parent.parentNode.removeChild(parent);
        }
      }
      streamingBubble = null;
      showTypingIndicator(false);
    }

    function handleChatWsMessage(data) {
      if (!data || typeof data !== 'object') return;

      if (data.type === 'connected') {
        updateConnectionStatus(true, 'Connected');
        return;
      }

      if (data.type === 'history' && Array.isArray(data.messages)) {
        const chat = document.getElementById('chatMessages');
        chat.replaceChildren();
        data.messages.forEach((msg) => {
          const text = typeof msg?.text === 'string' ? msg.text : '';
          const timestamp = Number(msg?.timestamp) || Math.floor(Date.now() / 1000);
          const role = msg?.is_system ? 'system' : (msg?.role === 'user' || msg?.from === 'user' ? 'user' : 'op');
          appendChatMessage(text, role, timestamp);
        });
        return;
      }

      if (data.type === 'stream') {
        beginStreamIfNeeded();
        showTypingIndicator(true);
        const delta = typeof data.delta === 'string' ? data.delta : '';
        streamingBubble.textContent += delta;
        const messages = document.getElementById('chatMessages');
        messages.scrollTop = messages.scrollHeight;
        return;
      }

      if (data.type === 'stream_end') {
        finalizeStream();
        return;
      }

      if (data.type === 'reply') {
        finalizeStream();
        appendChatMessage(data.text ?? '', 'op');
        return;
      }

      if (data.type === 'error') {
        finalizeStream();
        appendChatMessage(data.text ?? 'Chat error', 'system');
      }
    }

    // Send chat message
    function sendMessage() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();

      if (!text) {
        return;
      }

      if (!chatSocket || chatSocket.readyState !== WebSocket.OPEN) {
        appendChatMessage('Chat is disconnected. Reconnecting...', 'system');
        return;
      }

      appendChatMessage(text, 'user');
      input.value = '';
      chatSocket.send(JSON.stringify({ message: text }));
    }

    // Handle Enter key in chat
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    // Update connection status
    function updateConnectionStatus(connected, label = null) {
      const status = document.getElementById('connStatus');
      const text = document.getElementById('connText');

      if (connected) {
        status.className = 'connection-status connected';
        text.textContent = label || 'Connected';
      } else {
        status.className = 'connection-status disconnected';
        text.textContent = label || 'Disconnected';
      }
    }

    function getNetworkWindow(network, key) {
      if (!network || typeof network !== 'object') {
        return { bytes_sent_str: '—', bytes_recv_str: '—' };
      }
      const window = network[key];
      if (!window || typeof window !== 'object') {
        return { bytes_sent_str: '—', bytes_recv_str: '—' };
      }
      return {
        bytes_sent_str: window.bytes_sent_str ?? '—',
        bytes_recv_str: window.bytes_recv_str ?? '—'
      };
    }

    // Fetch and update system stats
    async function fetchSystemStats() {
      try {
        const response = await fetch('/api/system');
        const data = await response.json();

        // Uptime
        document.getElementById('sysUptime').textContent = data.uptime;

        // RAM
        document.getElementById('sysRam').textContent =
          `${data.memory.used_gb} / ${data.memory.total_gb} GB`;
        document.getElementById('sysRamPercent').textContent =
          `${data.memory.percent.toFixed(1)}%`;

        const ramBar = document.getElementById('sysRamBar');
        ramBar.style.width = `${data.memory.percent}%`;
        ramBar.className = 'progress-fill';
        if (data.memory.percent > 90) ramBar.className += ' error';
        else if (data.memory.percent > 75) ramBar.className += ' warning';

        // CPU
        document.getElementById('sysCpu').textContent =
          `${data.cpu.percent.toFixed(1)}%`;

        // CPU load bars (normalize to 100% at 4.0 load)
        const maxLoad = 4.0;
        document.getElementById('cpuLoad1m').style.height =
          `${Math.min(100, (data.cpu.load_1m / maxLoad) * 100)}%`;
        document.getElementById('cpuLoad5m').style.height =
          `${Math.min(100, (data.cpu.load_5m / maxLoad) * 100)}%`;
        document.getElementById('cpuLoad15m').style.height =
          `${Math.min(100, (data.cpu.load_15m / maxLoad) * 100)}%`;

        document.getElementById('cpuLoad1mLabel').textContent =
          `${data.cpu.load_1m}`;
        document.getElementById('cpuLoad5mLabel').textContent =
          `${data.cpu.load_5m}`;
        document.getElementById('cpuLoad15mLabel').textContent =
          `${data.cpu.load_15m}`;

        // Network windows
        const allTime = getNetworkWindow(data.network, 'all_time');
        const last24h = getNetworkWindow(data.network, 'last_24h');
        const last1h = getNetworkWindow(data.network, 'last_1h');

        document.getElementById('sysNetAllTimeSent').textContent = allTime.bytes_sent_str;
        document.getElementById('sysNetAllTimeRecv').textContent = allTime.bytes_recv_str;
        document.getElementById('sysNet24hSent').textContent = last24h.bytes_sent_str;
        document.getElementById('sysNet24hRecv').textContent = last24h.bytes_recv_str;
        document.getElementById('sysNet1hSent').textContent = last1h.bytes_sent_str;
        document.getElementById('sysNet1hRecv').textContent = last1h.bytes_recv_str;

      } catch (error) {
        console.error('Error fetching system stats:', error);
      }
    }

    function scheduleChatReconnect() {
      if (chatReconnectTimer) return;
      const delay = chatReconnectDelayMs;
      updateConnectionStatus(false, `Reconnecting in ${(delay / 1000).toFixed(1)}s`);
      chatReconnectTimer = setTimeout(() => {
        chatReconnectTimer = null;
        connectChatWebSocket();
      }, delay);
      chatReconnectDelayMs = Math.min(chatReconnectDelayMs * 2, 10000);
    }

    function connectChatWebSocket() {
      if (chatSocket) {
        chatSocket.close();
        chatSocket = null;
      }

      const wsProtocol = location.protocol === 'https:' ? 'wss' : 'ws';
      chatSocket = new WebSocket(`${wsProtocol}://${location.host}/ws/chat`);
      updateConnectionStatus(false, 'Connecting...');

      chatSocket.onopen = () => {
        chatReconnectDelayMs = 1000;
        if (chatReconnectTimer) {
          clearTimeout(chatReconnectTimer);
          chatReconnectTimer = null;
        }
      };

      chatSocket.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          handleChatWsMessage(data);
        } catch (error) {
          console.error('Invalid chat WS payload:', error);
        }
      };

      chatSocket.onerror = (error) => {
        console.error('Chat WS error:', error);
      };

      chatSocket.onclose = () => {
        finalizeStream();
        showTypingIndicator(false);
        scheduleChatReconnect();
      };
    }

    // Connect to SSE
    function connectSSE() {
      if (eventSource) {
        eventSource.close();
      }

      eventSource = new EventSource('/api/sse');

      eventSource.onopen = () => {
        if (sseReconnectTimer) {
          clearTimeout(sseReconnectTimer);
          sseReconnectTimer = null;
        }
      };

      eventSource.addEventListener('agents', (event) => {
        const data = parseEventData(event, 'agents');
        if (!data) return;
        if (Array.isArray(data)) {
          updateAgentTable(data);
          return;
        }
        if (typeof data === 'object') {
          if (data.stats) updateStats(data.stats);
          if (Array.isArray(data.agents)) updateAgentTable(data.agents);
        }
      });

      eventSource.addEventListener('system', (event) => {
        const data = parseEventData(event, 'system');
        if (!data || typeof data !== 'object') return;

        // Current server contract sends dashboard counters on `system`.
        if ('active' in data || 'completed_today' in data || 'queued' in data || 'total' in data) {
          updateStats(data);
          return;
        }

        // Chat now uses WebSocket only.
      });

      // Backwards-compatible fallback for legacy unnamed SSE payloads.
      eventSource.addEventListener('message', (event) => {
        const data = parseEventData(event, 'message');
        if (!data) return;

        if (data.stats || data.agents) {
          updateStats(data.stats);
          updateAgentTable(data.agents);
        }

        // Chat now uses WebSocket only.
      });

      eventSource.onerror = () => {
        eventSource.close();

        // Reconnect after 2 seconds
        if (!sseReconnectTimer) {
          sseReconnectTimer = setTimeout(() => {
            connectSSE();
          }, 2000);
        }
      };
    }

    // Initialize on load
    async function init() {
      // Load initial data
      await fetchSystemStats();

      // Connect to live updates (SSE for agents/system, WS for chat)
      connectSSE();
      connectChatWebSocket();

      // Refresh system stats every 90 seconds
      systemStatsInterval = setInterval(fetchSystemStats, 90000);
    }

    init();
  </script>
</body>
</html>
