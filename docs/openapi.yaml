openapi: "3.0.3"
info:
  title: Agent Dashboard API
  description: |
    REST and WebSocket API for the Agent Orchestration Dashboard.
    Tracks coding agents (Claude Code, Codex CLI) running in tmux sessions,
    provides real-time SSE updates, and relays chat to OpenClaw Gateway.
  version: "1.0.0"
  license:
    name: MIT

servers:
  - url: http://localhost:8223
    description: Local development
  - url: https://dash.example.com
    description: Production (behind Cloudflare Access)

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: |
        Required for all mutating endpoints when DASHBOARD_API_KEY is set.
        In production (dev mode off), endpoints return 401 without a valid key.

  schemas:
    Agent:
      type: object
      required: [id, project, task, status]
      properties:
        id:
          type: string
          maxLength: 64
          description: Unique agent identifier (e.g., tmux session name)
        project:
          type: string
          maxLength: 256
          description: Project the agent is working on
        task:
          type: string
          maxLength: 1024
          description: Current task description
        status:
          type: string
          enum: [queued, working, done, error]
        model:
          type: string
          maxLength: 128
          description: Model being used (e.g., claude-sonnet-4-5)
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        exit_reason:
          type: string
          description: How the agent finished (completed, killed, error)

    AgentStats:
      type: object
      properties:
        total:
          type: integer
        by_status:
          type: object
          additionalProperties:
            type: integer
        recent_completions:
          type: integer
          description: Agents completed in the last hour

    ChatMessage:
      type: object
      required: [message]
      properties:
        message:
          type: string
          maxLength: 10000
          description: Chat message text

    SystemInfo:
      type: object
      properties:
        hostname:
          type: string
        uptime:
          type: number
          description: System uptime in seconds
        cpu_percent:
          type: number
        memory_percent:
          type: number
        disk_percent:
          type: number
        tmux_sessions:
          type: array
          items:
            type: string

    Error:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          type: string

    Success:
      type: object
      properties:
        success:
          type: boolean
          enum: [true]

paths:
  /api/agents:
    get:
      summary: List all agents
      description: Returns all registered agents and their current status.
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/Agent"

    post:
      summary: Register a new agent
      description: Creates or updates an agent entry. Requires API key when auth is enabled.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, project, task]
              properties:
                id:
                  type: string
                  maxLength: 64
                project:
                  type: string
                  maxLength: 256
                task:
                  type: string
                  maxLength: 1024
                model:
                  type: string
                  maxLength: 128
      responses:
        "200":
          description: Agent registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "400":
          description: Validation error (missing fields, field too long, invalid JSON)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: Request body too large (>1MB)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Rate limit exceeded (100 requests/minute)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/agents/{id}/status:
    patch:
      summary: Update agent status
      description: Transitions an agent to a new status. Requires API key when auth is enabled.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [queued, working, done, error]
                exit_reason:
                  type: string
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "400":
          description: Invalid status value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/agents/stats:
    get:
      summary: Get agent statistics
      description: Returns aggregate statistics about registered agents.
      responses:
        "200":
          description: Agent stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  stats:
                    $ref: "#/components/schemas/AgentStats"

  /api/chat:
    post:
      summary: Send a chat message
      description: Stores a chat message (displayed in the dashboard chat panel).
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessage"
      responses:
        "200":
          description: Message stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Success"
        "400":
          description: Invalid message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/chat/history:
    get:
      summary: Get chat history
      description: |
        Returns stored chat messages. Requires API key authentication
        (returns 403 even in dev mode if no key is configured).
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Chat history
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        role:
                          type: string
                        content:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
        "403":
          description: Forbidden (no API key configured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/system:
    get:
      summary: Get system information
      description: Returns host system metrics (CPU, memory, disk, tmux sessions).
      responses:
        "200":
          description: System info
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  system:
                    $ref: "#/components/schemas/SystemInfo"

  /events:
    get:
      summary: Server-Sent Events stream
      description: |
        Real-time SSE stream of dashboard events. Emits agent state changes,
        system updates, and chat messages. Initial connection sends current
        agent list and system info.
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Events are JSON objects with a "type" field:
                  - agent_update: Agent state changed
                  - system: System metrics update
                  - chat: New chat message

  /ws/chat:
    get:
      summary: WebSocket chat relay
      description: |
        WebSocket endpoint that relays messages between the dashboard and
        OpenClaw Gateway. Requires API key as query parameter and valid
        Origin header matching DASH_ALLOWED_ORIGINS.
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
          description: API key for authentication
      responses:
        "101":
          description: WebSocket upgrade successful
        "403":
          description: Origin not allowed or gateway URL not configured
